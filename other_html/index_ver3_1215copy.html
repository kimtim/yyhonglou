<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《红楼梦》人物关系图谱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "SimSun", sans-serif;
      background: #fafafa;
      color: #333;
      overflow: hidden;
    }
    .controls {
      padding: 5px;
      background: #fff;
      border-bottom: 1px solid #eee;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .controls label {
      font-weight: bold;
      color: #c00;
    }
    .controls select,
    .controls button {
      padding: 3px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      min-width: 120px;
    }
    .controls button {
      background: #f8f8f8;
      cursor: pointer;
    }
    .controls button:hover {
      background: #e9e9e9;
    }
    #loading {
      color: #999;
      font-style: italic;
    }
    .main-title {
      text-align: center;
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid #eee;
      font-size: 16px;
      color: #c00;
    }
    #graph {
      width: 100%;
      height: calc(100vh - 100px);
    }
    .node { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .link { stroke: #999; stroke-opacity: 0.4; }
    .tooltip {
      position: absolute;
      padding: 8px 10px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      max-width: 300px;
      z-index: 1000;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.6);
    }
    .modal-content {
      background: #fff;
      margin: 5% auto;
      padding: 20px;
      border-radius: 8px;
      width: 80%;
      max-width: 750px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover { color: #000; }
    .modal h2 { color: #c00; margin-top: 0; line-height: 2.0;}
    .modal h3 {
      margin-top: 16px;
      margin-bottom: 8px;
      color: #333;
    }
    .modal ul { padding-left: 20px; }
    .modal li { margin-bottom: 6px; line-height: 1.4; }

	#story-list {
		font-size: 14px;
	}

	#story-list .quote {
	  color: #c00; /* 红色，对原文的引用 */
	  font-family: "微软雅黑", "STKaiti", "SimKai", serif;
	  display: block;
	  margin: 6px 0;
	  font-size: 14px;
	  line-height: 1.5;
	}
	
	#story-brief .pinglun { /* 章节介绍的评论部分 */
	  color: #a33; 
	  font-family: "Microsoft YaHei", "STKaiti", "SimKai", serif;
	  display: block;
	  font-size: 14px;
	  margin: 6px 0;
	  line-height: 1.6;
	}	
		
	.tooltip .quote {
	  color: #fcc; /* 红色，悬浮框内字体 */
	  margin: 1px 0;
	  line-height: 1.2;
	}	

	.clue {
	  color: #555; /* 灰色文字 */
	  margin: 1px 0;
	  font-size: 14px;
	  line-height: 1.4;
	}
	.clue .clue-name{
	  color: #955; /* 暗黑名字，可怕预言 */
	  margin: 1px 0;
	  font-weight: bold;
	  font-size: 1.1em;
	  line-height: 1.8;
	}	

    /* 高亮样式 */
    .link.highlight {
      stroke: #e74c3c;
      stroke-width: 2;
      stroke-opacity: 0.9;
    }
    .node.highlight {
      stroke: #c00;
      stroke-width: 2;
    }
    .label.highlight {
      font-weight: bold;
      fill: #c00;
    }
  </style>
</head>
<body>
  <div class="main-title" id="chapter-title">请选择章节目录</div>
  <div class="controls">
    <label for="chapter-select">选择章节：</label>
    <select id="chapter-select">
      <option value="">请选择</option>
    </select>
    <button id="story-btn" style="display:none;">本回故事主线</button>
    <span id="loading">等待加载中…</span>
  </div>  
  <div id="graph"></div>
  <div id="tooltip" class="tooltip"></div>

  <!-- 人物详情模态框 -->
  <div id="personModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modal-name"></h2>
      <p id="modal-brief"></p>
      <h3>详细介绍</h3>
      <p id="modal-detail"></p>
      <h3>出场回目概要</h3>
      <ul id="modal-appearances"></ul>
    </div>
  </div>

  <!-- 故事主线模态框 -->
  <div id="storyModal" class="modal">
    <div class="modal-content">
      <span class="close close-story">&times;</span>
      <h2 id="story-title">本回故事主线</h2>
	  <p id="story-brief"></p>
      <h3>英莲/香菱 时间轴线</h3>	  
      <ul id="story-list"></ul>
      <h3>后续情节推演</h3>
      <ul id="story-detail"></ul>	  
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // === 配置 ===
    const MAX_CHAPTER = 80;
    const CHARACTERS_FILE = 'data1/characters.json';

    // === 全局状态 ===
    let allCharacters = null;
    let currentSimulation = null;
    let currentStoryThreads = null;

    // === 初始化：加载人物库 + 填充下拉框 ===
    Promise.all([
      d3.json(CHARACTERS_FILE),
      initChapterSelect()
    ]).then(([chars]) => {
      allCharacters = chars;
    }).catch(err => {
      console.error("初始化失败:", err);
      alert("无法加载基础人物数据，请确保 characters.json 存在");
    });
	
	function formatTimeLine(timeLine) {
	  if (!timeLine || timeLine.length === 0) return "暂无线索";

	  return timeLine.map(item => {
		// 解析 age 对象为“姓名 年龄岁”格式
		const ageParts = Object.entries(item.age).map(([name, age]) => `${name} ${age}岁`);
		const ageStr = ageParts.join("，");

		// 返回带样式的完整 HTML 行
		return `${item.text} >>> ${ageStr}`;
		}).join("");
	}
	
	function formatClue(clue) {
	  if (!clue || clue.length === 0) return "暂无伏线";

	  return clue.map(item => {
		// 返回带样式的完整 HTML 行
		return `<div class="clue"><li class="clue-name">${item.name}</li> ${item.destiny}</class>`;
		}).join("");
	}	
	
    function initChapterSelect() {
      const select = d3.select("#chapter-select");
      for (let i = 1; i <= MAX_CHAPTER; i++) {
        select.append("option")
          .attr("value", i)
          .text(`第${i}回`);
		  }		  
		  select.on("change", handleChapterChange);
		  //默认第一章
		  select.property("value", "1");
		  select.on("change").call(select.node());		  
		  return Promise.resolve();
		  }
		  async function handleChapterChange() {
		  const chapterNum = this.value;
		  if (!chapterNum) {
			  clearGraph();
			  d3.select("#chapter-title").text("请选择章节目录");
			  d3.select("#story-btn").style("display", "none");
			  currentStoryThreads = null;
			  return;
		  }
		  d3.select("#loading").style("display", "inline");
		  try {
		  const chapterData = await d3.json(`data1/chapter${chapterNum}.json`);
		currentStoryThreads = chapterData.summary || null;
		<!-- core_source1 = chapterData.core_sources[0]; -->
		<!-- core_source2 = chapterData.core_sources[1]; -->
        renderGraph(chapterData);
		
        d3.select("#chapter-title").text(chapterData.title || `第${chapterNum}回`);
		<!-- d3.select("#story-title").text(`主线——1.${core_source1} 2.${core_source2}`); -->
		//d3.select("#story-brief").text(`${currentStoryThreads}`);
		document.getElementById("story-brief").innerHTML = chapterData.summary;
		document.getElementById("story-list").innerHTML = formatTimeLine(chapterData.time_line);
		document.getElementById("story-detail").innerHTML = formatClue(chapterData.clue);
		
		
		//d3.select("#story-list").text(`${formatTimeLine(chapterData.time_line)}`);
        d3.select("#story-btn").style("display", currentStoryThreads ? "inline-block" : "none");
		} catch (err) {
        console.error(`加载第${chapterNum}回失败:`, err);
        alert(`暂无第${chapterNum}回数据，或文件不存在。`);
        clearGraph();
        d3.select("#chapter-title").text(`第${chapterNum}回（数据未就绪）`);
        d3.select("#story-btn").style("display", "none");
        currentStoryThreads = null;
      } finally {
        d3.select("#loading").style("display", "none");
      }
    }

    function clearGraph() {
      d3.select("#graph svg").remove();
      if (currentSimulation) {
        currentSimulation.stop();
        currentSimulation = null;
      }
    }

    function renderGraph(chapter) {
      clearGraph();

      const width = window.innerWidth;
      const height = window.innerHeight - 100;

      const svg = d3.select("#graph")
        .append("svg")
        .attr("width", width)
        .attr("height", height)
        .call(d3.zoom().on("zoom", (event) => {
          container.attr("transform", event.transform);
        }))
        .append("g");

      const container = svg.append("g");

      const nodes = chapter.nodes.map(id => {
        const info = allCharacters[id];
        if (!info) {
          console.warn(`警告：人物 "${id}" 未在 characters.json 中定义`);
          return {
		  id,
		  brief: "（未知实体）",
		  detail: "",
		  appearances: {},
		  group: "未知"
          };
		  }
		  return {
          id,
          ...info,
          group: getGroup(id)
		  };
		  });
		  const links = chapter.links || [];
		  const color = d3.scaleOrdinal()
		  .domain(["主子", "奴才", "宗教人士", "神话人物", "象征/场景", "未知"])
		  .range(["#e74c3c", "#3498db", "#2ecc71", "#f39c12", "#9b59b6", "#95a5a6"]);
		  function getGroup(id) {
		  const myth = ["女娲", "警幻仙子"];
		  const religious = ["茫茫大士", "渺渺真人"];
		  const masters = [
          "贾母", "贾政", "王夫人", "贾赦", "邢夫人", "贾珍", "尤氏",
          "贾琏", "王熙凤", "贾宝玉", "林黛玉", "薛宝钗", "贾元春",
          "贾探春", "贾惜春", "甄士隐", "贾雨村", "冷子兴", "林如海"
		  ];
		  const symbolic = [
          "太虚幻境", "迷津", "通灵宝玉", "金陵十二钗判词", "红楼梦曲", "可卿"
		  ];
		  if (myth.includes(id)) return "神话人物";
		  if (religious.includes(id)) return "宗教人士";
		  if (symbolic.includes(id)) return "象征/场景";
		  if (masters.includes(id)) return "主子";
		  return "奴才";
		  }
		  // 力导向模拟
		  const simulation = d3.forceSimulation(nodes)
		  .force("link", d3.forceLink(links).id(d => d.id).distance(120))
		  .force("charge", d3.forceManyBody().strength(-400))
		  .force("center", d3.forceCenter(width / 2, height / 2))
		  .force("collision", d3.forceCollide().radius(35))
		  .alphaDecay(0.02);
		  currentSimulation = simulation;
		  // 绘制连线
		  const link = container.append("g")
		  .selectAll("line")
		  .data(links)
		  .enter().append("line")
		  .attr("class", "link");
		  // 绘制节点
		  const node = container.append("g")
		  .selectAll("circle")
		  .data(nodes)
		  .enter().append("circle")
		  .attr("class", "node")
		  .attr("r", 14)
		  .attr("fill", d => color(d.group));
		  // 绘制标签
		  const label = container.append("g")
		  .selectAll("text")
		  .data(nodes)
		  .enter().append("text")
		  .attr("class", "label")
		  .text(d => d.id)
		  .attr("dx", 16)
		  .attr("dy", 4)
		  .attr("font-size", "12px")
		  .style("pointer-events", "none");
		  // 拖拽交互
		  node.call(d3.drag()
		  .on("start", dragstarted)
		  .on("drag", dragged)
		  .on("end", dragended));
		  // 悬停 & 点击
		  const tooltip = d3.select("#tooltip");
		  node.on("mouseenter", function(event, d) {
		  const relatedLinks = links.filter(
			l => l.source.id === d.id || l.target.id === d.id
		  );
		  let tip = `<h3>${d.id}</h3>`
		  if (relatedLinks.length > 0) {
          tip += relatedLinks.map(l => {
		  const other = l.source.id === d.id ? l.target.id : l.source.id;
		  return `<li>${other} : ${l.relation}</li>`;
          }).join("");
		  } else {
          tip = `${d.id} 与本回无直接关系`;
		  }
		  tooltip
          .style("opacity", 1)
          .html(tip)
          .style("left", event.pageX + 10 + "px")
          .style("top", event.pageY - 10 + "px");
		  highlightNeighbors(d.id, links, link, node, label);
		  })
		  .on("mouseleave", () => {
		  tooltip.style("opacity", 0);
		  clearHighlight(link, node, label);
		  })
		  .on("click", function(event, d) {
		  const info = allCharacters[d.id] || d;
		  d3.select("#modal-name").text(d.id);
		  d3.select("#modal-brief").text(info.brief || "");
		  d3.select("#modal-detail").text(info.detail || "暂无详情");
		  const ul = d3.select("#modal-appearances");
		  ul.html("");
		  if (info.appearances) {
          Object.keys(info.appearances)
		  .sort((a, b) => parseInt(a) - parseInt(b))
		  .forEach(ch => {
		  ul.append("li").text(`第${ch}回：${info.appearances[ch]}`);
            });
        }
        d3.select("#personModal").style("display", "block");
      });

      // 力导向 tick
      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
        node
          .attr("cx", d => d.x)
          .attr("cy", d => d.y);
        label
          .attr("x", d => d.x)
          .attr("y", d => d.y);
      });

		function getId(nodeOrId) {
		  return typeof nodeOrId === 'string' ? nodeOrId : (nodeOrId?.id || '');
		}

      function highlightNeighbors(nodeId, links, linkSel, nodeSel, labelSel) {
        linkSel.classed("highlight", d =>
          d.source.id === nodeId || d.target.id === nodeId
        );//线高亮
		  nodeSel.classed("highlight", d => {
			if (d.id === nodeId) return true; // 自己肯定高亮
			// 检查是否是邻居
			return links.some(l =>
			  (getId(l.source) === nodeId && getId(l.target) === d.id) ||
			  (getId(l.target) === nodeId && getId(l.source) === d.id)
			);
		  });
        labelSel.classed("highlight", d =>
          d.id === nodeId || links.some(l =>
			  (getId(l.source) === nodeId && getId(l.target) === d.id) ||
			  (getId(l.target) === nodeId && getId(l.source) === d.id)
			)
        );//标签高亮
      }

      function clearHighlight(linkSel, nodeSel, labelSel) {
        linkSel.classed("highlight", false);
        nodeSel.classed("highlight", false);
        labelSel.classed("highlight", false);
      }

      function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
      }
      function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
      }
      function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
      }
    }

    // === 故事主线按钮事件 ===
    d3.select("#story-btn").on("click", () => {
      if (!currentStoryThreads) return;
		//document.getElementById("story-list").innerHTML = currentStoryThreads;

		// 显示弹窗
		document.getElementById("storyModal").style.display = "block";	
	  
      <!-- const ul = d3.select("#story-list"); -->
      <!-- ul.html(""); -->
      <!-- currentStoryThreads.forEach(thread => { -->
        <!-- ul.append("li").text(thread); -->
      <!-- }); -->
	  <!-- ul.text(currentStoryThreads); -->
		// 假设 summary 是你上面那段带 HTML 的字符串
		//const summary = chapterData.summary; // 从 JSON 读取

  
	  
      <!-- d3.select("#storyModal").style("display", "block"); -->
    });

    // === 关闭模态框 ===
    d3.selectAll(".close").on("click", function() {
      d3.select(this.closest(".modal")).style("display", "none");
    });

    d3.selectAll(".modal").on("click", function(event) {
      if (event.target === this) {
        d3.select(this).style("display", "none");
      }
    });
  </script>
</body>
</html>
