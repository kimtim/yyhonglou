<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>红楼梦人物关系图</title>
  <script src="./d3.v7.min.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; }
        #timeline { margin: 20px; }
        .node-label { font-size: 12px; pointer-events: none; }
        .link { stroke-opacity: 0.6; }
    </style>
</head>
<body>
    <h2>红楼梦人物关系图（前80回）</h2>
    <div id="timeline">
        <label>时间范围（第X回到第Y回）:</label>
        <input type="range" id="startRange" min="1" max="80" value="1">
        <input type="range" id="endRange" min="1" max="80" value="80">
        <span id="rangeValues">1 - 80</span>
    </div>
    <svg width="1200" height="800"></svg>

    <script>
        // === 数据定义 ===
        const data = {
            nodes: [
                { id: "贾宝玉", group: 1, family: "贾家" },
                { id: "林黛玉", group: 2, family: "林家" },
                { id: "薛宝钗", group: 3, family: "薛家" },
                { id: "贾政", group: 1, family: "贾家" },
                { id: "贾母", group: 1, family: "贾家" },
                { id: "王熙凤", group: 1, family: "王家" },
                { id: "袭人", group: 1, family: "贾家" },
                { id: "晴雯", group: 1, family: "贾家" },
                { id: "史湘云", group: 4, family: "史家" },
                { id: "薛姨妈", group: 3, family: "薛家" },
                { id: "贾琏", group: 1, family: "贾家" },
                { id: "贾元春", group: 1, family: "贾家" },
                { id: "刘姥姥", group: 5, family: "外戚" }
            ],
            links: [
                { source: "贾宝玉", target: "林黛玉", type: "恋人", chapter: 3 },
                { source: "贾宝玉", target: "薛宝钗", type: "婚姻", chapter: 27 },
                { source: "贾宝玉", target: "贾母", type: "祖孙", chapter: 1 },
                { source: "贾宝玉", target: "王熙凤", type: "主仆", chapter: 13 },
                { source: "贾宝玉", target: "袭人", type: "主仆", chapter: 19 },
                { source: "贾宝玉", target: "晴雯", type: "主仆", chapter: 31 },
                { source: "林黛玉", target: "贾母", type: "祖孙", chapter: 2 },
                { source: "薛宝钗", target: "薛姨妈", type: "母女", chapter: 4 },
                { source: "王熙凤", target: "贾琏", type: "夫妻", chapter: 6 },
                { source: "贾元春", target: "贾政", type: "父女", chapter: 17 },
                { source: "史湘云", target: "贾母", type: "祖孙", chapter: 38 },
                { source: "刘姥姥", target: "王熙凤", type: "主仆", chapter: 61 }
            ]
        };

        // === 配色方案 ===
        const familyColors = {
            "贾家": "#e63946", "林家": "#f4a261", 
            "薛家": "#2a9d8f", "王家": "#264653", 
            "史家": "#f9c74f", "外戚": "#d62828"
        };

        // === 创建 SVG ===
        const svg = d3.select("svg");
        const width = +svg.attr("width");
        const height = +svg.attr("height");

        // === 初始化力导向图 ===
        let currentLinks = [...data.links];
        let currentNodes = [...data.nodes];

        const simulation = d3.forceSimulation(currentNodes)
            .force("link", d3.forceLink(currentLinks).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2));

        // === 创建图形元素 ===
        const linkGroup = svg.append("g").attr("stroke", "#999").selectAll(".link");
        const link = linkGroup.data(currentLinks).enter()
            .append("line")
            .attr("class", "link")
            .attr("stroke-width", d => {
                return d.type === "恋人" ? 4 : d.type === "婚姻" ? 3 : 2;
            });

        const node = svg.append("g").attr("stroke", "#fff").selectAll(".node")
            .data(currentNodes).enter()
            .append("circle")
            .attr("class", "node")
            .attr("r", 10)
            .attr("fill", d => {
                // 修复：防御性检查
                const family = d && d.family ? d.family : "外戚";
                return familyColors[family] || familyColors["外戚"];
            })
            .call(drag(simulation));

        const label = svg.append("g").selectAll(".node-label")
            .data(currentNodes).enter()
            .append("text")
            .attr("class", "node-label")
            .text(d => d.id);

        // === 时间轴联动 ===
        const startRange = document.getElementById("startRange");
        const endRange = document.getElementById("endRange");
        const rangeValues = document.getElementById("rangeValues");

        function updateTimeline() {
            const start = parseInt(startRange.value);
            const end = parseInt(endRange.value);
            rangeValues.textContent = `${start} - ${end}`;
            
            currentLinks = data.links.filter(l => l.chapter >= start && l.chapter <= end);
            currentNodes = Array.from(new Set([...currentLinks.map(l => l.source), ...currentLinks.map(l => l.target)]))
                .map(id => {
                    const node = data.nodes.find(n => n.id === id);
                    return node || { id, family: "外戚" }; // 默认值
                });
                
            restartSimulation();
        }

        startRange.addEventListener("input", updateTimeline);
        endRange.addEventListener("input", updateTimeline);

        // === 动态高亮 ===
        node.on("click", (event, d) => {
            const relatedLinks = data.links.filter(l => 
                l.source === d.id || l.target === d.id
            );
            
            currentLinks = relatedLinks;
            currentNodes = Array.from(new Set([...relatedLinks.map(l => l.source), ...relatedLinks.map(l => l.target)]))
                .map(id => {
                    const node = data.nodes.find(n => n.id === id);
                    return node || { id, family: "外戚" }; // 默认值
                });
                
            restartSimulation();
        });

        // === 辅助函数 ===
        function restartSimulation() {
            // 重置图形元素
            link.remove();
            node.remove();
            label.remove();

            // 重新创建图形
            const newLink = linkGroup.data(currentLinks).enter()
                .append("line")
                .attr("class", "link")
                .attr("stroke-width", d => {
                    return d.type === "恋人" ? 4 : d.type === "婚姻" ? 3 : 2;
                });

            const newNodes = svg.append("g").attr("stroke", "#fff").selectAll(".node")
                .data(currentNodes).enter()
                .append("circle")
                .attr("class", "node")
                .attr("r", 10)
                .attr("fill", d => {
                    const family = d && d.family ? d.family : "外戚";
                    return familyColors[family] || familyColors["外戚"];
                })
                .call(drag(simulation));

            const newLabels = svg.append("g").selectAll(".node-label")
                .data(currentNodes).enter()
                .append("text")
                .attr("class", "node-label")
                .text(d => d.id);

            // 重新启动模拟
            simulation.nodes(currentNodes).alpha(1).restart();
            simulation.force("link").links(currentLinks);
        }

        function drag(simulation) {
            return d3.drag()
                .on("start", (event, d) => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                })
                .on("drag", (event, d) => {
                    d.fx = event.x;
                    d.fy = event.y;
                })
                .on("end", (event, d) => {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                });
        }

        // 初始渲染
        updateTimeline();
    </script>
</body>
</html>
